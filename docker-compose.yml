services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rec-backend
    env_file: backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rec-frontend
    env_file: frontend/.env
    ports:
      - "8501:8501"
    depends_on:
      - backend
